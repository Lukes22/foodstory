{% extends "base.html" %}
{% block title %}注册 - 食友记{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">创建你的冒险者</h1>
        <p class="auth-subtitle">开启食友记冒险之旅</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required
                       placeholder="为你的冒险者取个名字 (2-20字符)" autocomplete="username"
                       minlength="2" maxlength="20">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required
                       placeholder="设置密码 (至少6位)" autocomplete="new-password"
                       minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm" required
                       placeholder="再次输入密码" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary">创建冒险者</button>
        </form>

        <p class="auth-link">
            已有账号？<a href="{{ url_for('auth.login') }}">登录</a>
        </p>
    </div>
</div>
{% endblock %}
